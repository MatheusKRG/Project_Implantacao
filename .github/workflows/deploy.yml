name: Deploy Firebase Hosting

on:
  push:
    branches:
      - production
      - dev

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'production' && 'production' || 'developer' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Select deploy target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            echo "DEPLOY_SCRIPT=deploy:prod" >> "$GITHUB_ENV"
            echo "DOTENV_FILE=.env.production" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_SCRIPT=deploy:dev" >> "$GITHUB_ENV"
            echo "DOTENV_FILE=.env.development" >> "$GITHUB_ENV"
          fi

      - name: Create Supabase env file
        shell: bash
        run: |
          test -n "${{ secrets.VITE_SUPABASE_URL }}"
          test -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          cat <<EOF > "${DOTENV_FILE}"
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          EOF

      - name: Deploy to Firebase Hosting
        run: npm run ${{ env.DEPLOY_SCRIPT }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
